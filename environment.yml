name: pt

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Core scientific stack
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy=1.11.4
  - scikit-learn=1.3.2
  - joblib=1.5.3

  # Bioinformatics
  - biopython=1.86

  # Stable R version
  - r-base=4.3.3

  # Essential R runtime libs
  - r-essentials

  # pip
  - pip

  # Python packages
  - pip:
      - rpy2==3.5.16
